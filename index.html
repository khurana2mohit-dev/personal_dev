<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roka Ceremony</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#fff8f0,#ffe4e1);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    background:white;
    width:90%;
    max-width:700px;
    padding:50px 30px;
    text-align:center;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.1);
}

.tag{
    color:#c47b63;
    letter-spacing:3px;
    text-transform:uppercase;
    font-size:14px;
}

h1{
    font-size:3rem;
    margin:20px 0;
    color:#333;
}

.names{
    font-size:2rem;
    color:#b76e79;
    font-weight:600;
}

.details{
    margin-top:30px;
    line-height:2;
    color:#555;
    font-size:1.1rem;
}

.button{
    display:inline-block;
    margin-top:30px;
    padding:12px 24px;
    background:#b76e79;
    color:white;
    text-decoration:none;
    border-radius:30px;
}

.footer{
    margin-top:30px;
    color:#777;
}
</style>

</head>

<body>

<div class="card">
    <div class="tag">You're Invited</div>

```
<h1>💍 Roka Ceremony</h1>

<div class="names">
    Aarav ❤️ Ananya
</div>

<div class="details">
    📅 15 December 2026<br>
    ⏰ 6:00 PM Onwards<br>
    📍 Royal Heritage Palace, Jaipur
</div>

<a class="button" href="https://maps.google.com" target="_blank">
    View Location
</a>

<div class="footer">
    We request the pleasure of your presence and blessings.
</div>
```

</div>

</body>
</html>
