<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mohit ❤️ Monika | Roka Ceremony</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Poppins,sans-serif;
background:linear-gradient(135deg,#fff8f4,#fff1eb);
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
width:90%;
max-width:700px;
background:rgba(255,255,255,0.7);
backdrop-filter:blur(12px);
padding:40px;
border-radius:30px;
box-shadow:0 20px 60px rgba(0,0,0,.12);
text-align:center;
animation:fadeIn 1.5s ease;
z-index:2;
}

.invite{
letter-spacing:3px;
text-transform:uppercase;
color:#b88a44;
font-size:13px;
}

.names{
font-family:'Cormorant Garamond',serif;
font-size:4rem;
color:#8b5e3c;
margin-top:15px;
animation:slideUp 1.5s ease;
}

.and{
font-size:2rem;
color:#b88a44;
}

.icon{
font-size:70px;
margin:20px 0;
animation:pulse 2s infinite;
}

.details{
line-height:2;
font-size:1.1rem;
margin-top:20px;
color:#444;
}

.countdown{
margin-top:25px;
font-size:1.4rem;
font-weight:600;
color:#a45b3f;
}

.btn{
display:inline-block;
margin-top:25px;
padding:14px 28px;
border-radius:50px;
background:#b88a44;
color:white;
text-decoration:none;
font-weight:600;
animation:glow 2s infinite alternate;
}

.quote{
margin-top:25px;
font-style:italic;
color:#666;
}

.heart{
position:absolute;
font-size:24px;
opacity:.3;
color:#ff8fa3;
animation:float linear infinite;
}

.h1{left:10%;animation-duration:10s;}
.h2{left:30%;animation-duration:14s;}
.h3{left:50%;animation-duration:12s;}
.h4{left:70%;animation-duration:15s;}
.h5{left:90%;animation-duration:11s;}

@keyframes float{
from{
transform:translateY(100vh);
}
to{
transform:translateY(-100px);
}
}

@keyframes pulse{
50%{
transform:scale(1.15);
}
}

@keyframes fadeIn{
from{
opacity:0;
}
to{
opacity:1;
}
}

@keyframes slideUp{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes glow{
from{
box-shadow:0 0 5px #d4af37;
}
to{
box-shadow:0 0 25px #d4af37;
}
}

</style>

</head>

<body>

<div class="heart h1">❤</div>
<div class="heart h2">❤</div>
<div class="heart h3">❤</div>
<div class="heart h4">❤</div>
<div class="heart h5">❤</div>

<div class="card">

<div class="invite">
Together With Their Families
</div>

<div class="icon">💍</div>

<div class="names">
Mohit Makkar
</div>

<div class="and">&</div>

<div class="names">
Monika Godara
</div>

<div class="details">
Roka Ceremony<br><br>

📅 27 June 2026<br>
🕠 05:30 PM Onwards<br>
📍 Club House, New Chandigarh

</div>

<div id="countdown" class="countdown"></div>

<a class="btn"
href="https://maps.google.com/?q=New+Chandigarh"
target="_blank">
View Venue </a>

<div class="quote">
"Two hearts, one promise, a lifetime together."
</div>

</div>

<script>

const eventDate = new Date("June 27, 2026 17:30:00").getTime();

setInterval(() => {

const now = new Date().getTime();
const distance = eventDate - now;

const days = Math.floor(distance/(1000*60*60*24));
const hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));

document.getElementById("countdown").innerHTML =
"⏳ " + days + " Days " + hours + " Hours Remaining";

},1000);

</script>

</body>
</html>
